<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Embarques · Pietrobon</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ED3237">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body data-pagina="embarques.html">
  <div id="cabecalho"></div>
  <div class="container py-4">

    <div class="page-header">
      <div class="page-header-icon">🚢</div>
      <div class="page-header-texto">
        <h1 class="page-titulo">Painel de Embarques</h1>
        <p class="page-subtitulo">Detalhes das PIs, insumos do almoxarifado e recebimentos do B2 — defina a data de embarque</p>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-4">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">✅</div>
          <div class="display-6 fw-bold text-success" id="numero-prontas">0</div>
          <small class="text-muted fw-semibold">Prontas para produzir</small>
        </div>
      </div>
      <div class="col-6 col-md-4">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">🚫</div>
          <div class="display-6 fw-bold text-danger" id="numero-nao-prontas">0</div>
          <small class="text-muted fw-semibold">Não prontas</small>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card text-center py-3 px-2">
          <div class="resumo-card-icone">🚢</div>
          <div class="display-6 fw-bold text-primary" id="numero-com-embarque">0</div>
          <small class="text-muted fw-semibold">Com data de embarque</small>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-3 mb-3">
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="toggle-so-prontas">
        <label class="form-check-label fw-semibold small" for="toggle-so-prontas">Mostrar só Prontas para produzir</label>
      </div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="toggle-concluidas">
        <label class="form-check-label fw-semibold small" for="toggle-concluidas">Mostrar PIs concluídas</label>
      </div>
    </div>

    <div id="container-pis"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/JS/embarques.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/sw.js") }</script>
</body>
</html>
