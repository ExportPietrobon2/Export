<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Insumos - Exportação</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>
    <div class="tela-login">
        <div class="caixa-login">
            <h1>Controle de Insumos · Exportação</h1>
            <form id="form-login">
                <label class="linha-campo">
                    E-mail
                    <input type="email" id="campo-email" required>
                </label>
                <label class="linha-campo">
                    Senha
                    <input type="password" id="campo-senha" required>
                </label>
                <button type="submit" class="btn-primary">Entrar</button>
                <p id="mensagem-erro" class="erro"></p>
            </form>
        </div>
    </div>
    <script type="module" src="/JS/login.js"></script>
</body>
</html>
